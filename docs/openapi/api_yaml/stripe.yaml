openapi: 3.1.0
info:
  title: FastAPI - Stripe
  version: 0.1.0
paths:
  /stripe/checkout:
    post:
      tags:
      - stripe
      summary: Create Checkout
      operationId: create_checkout_stripe_checkout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutSessionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /stripe/topup:
    post:
      tags:
      - stripe
      summary: Create Topup
      operationId: create_topup_stripe_topup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopUpSessionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTopUpSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /stripe/subscription:
    delete:
      tags:
      - stripe
      summary: Cancel My Subscription
      operationId: cancel_my_subscription_stripe_subscription_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
components:
  schemas:
    CreateCheckoutSessionRequest:
      properties:
        plan_type:
          $ref: '#/components/schemas/PlanType'
        billing:
          type: string
          title: Billing
          default: monthly
      type: object
      required:
      - plan_type
      title: CreateCheckoutSessionRequest
    CreateCheckoutSessionResponse:
      properties:
        checkout_url:
          type: string
          title: Checkout Url
        session_id:
          type: string
          title: Session Id
      type: object
      required:
      - checkout_url
      - session_id
      title: CreateCheckoutSessionResponse
    CreateTopUpSessionRequest:
      properties:
        amount_usd:
          type: number
          minimum: 1.0
          title: Amount Usd
          description: 'Dollars to add as credit (1:1 conversion). Stripe minimum: $1.'
      type: object
      required:
      - amount_usd
      title: CreateTopUpSessionRequest
    CreateTopUpSessionResponse:
      properties:
        checkout_url:
          type: string
          title: Checkout Url
      type: object
      required:
      - checkout_url
      title: CreateTopUpSessionResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PlanType:
      type: string
      enum:
      - starter
      - pro
      - power
      title: PlanType
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
