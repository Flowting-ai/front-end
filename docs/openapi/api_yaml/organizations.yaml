components:
  schemas:
    OrganizationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        slug:
          type: string
          title: Slug
        description:
          type: string
          title: Description
          default: ''
        logo_url:
          anyOf:
            - type: string
            - type: 'null'
          title: Logo Url
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
        company_size:
          anyOf:
            - type: string
            - type: 'null'
          title: Company Size
        archived:
          type: boolean
          title: Archived
        my_role:
          anyOf:
            - $ref: '#/components/schemas/OrganizationRole'
            - type: 'null'
        owner_user_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Owner User Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
        - id
        - name
        - slug
        - archived
        - created_at
        - updated_at
      title: OrganizationResponse
    CreateOrganizationRequest:
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 1
          title: Name
        description:
          type: string
          title: Description
          default: ''
        logoUrl:
          anyOf:
            - type: string
              maxLength: 1024
            - type: 'null'
          title: Logourl
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
        allowedEmailDomains:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Allowedemaildomains
        companySize:
          anyOf:
            - type: string
              maxLength: 32
            - type: 'null'
          title: Companysize
      type: object
      required:
        - name
      title: CreateOrganizationRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    UpdateOrganizationRequest:
      properties:
        name:
          anyOf:
            - type: string
              maxLength: 255
              minLength: 1
            - type: 'null'
          title: Name
        slug:
          anyOf:
            - type: string
              maxLength: 255
              minLength: 1
              pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
            - type: 'null'
          title: Slug
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        logoUrl:
          anyOf:
            - type: string
              maxLength: 1024
            - type: 'null'
          title: Logourl
        tags:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Tags
        archived:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Archived
      type: object
      title: UpdateOrganizationRequest
    DeleteOrganizationRequest:
      properties:
        confirmName:
          type: string
          title: Confirmname
      type: object
      required:
        - confirmName
      title: DeleteOrganizationRequest
    OrganizationSettingsResponse:
      properties:
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        org_instructions:
          type: string
          title: Org Instructions
          default: ''
        allowed_email_domains:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Allowed Email Domains
        company_size:
          anyOf:
            - type: string
            - type: 'null'
          title: Company Size
        default_chat_visibility:
          type: string
          title: Default Chat Visibility
          default: private
        default_persona_visibility:
          type: string
          title: Default Persona Visibility
          default: private
        hitl_threshold:
          $ref: '#/components/schemas/HitlThreshold'
          default: ask_tier_3_plus
      type: object
      required:
        - organization_id
      title: OrganizationSettingsResponse
    UpdateOrganizationSettingsRequest:
      properties:
        orgInstructions:
          anyOf:
            - type: string
            - type: 'null'
          title: Orginstructions
        allowedEmailDomains:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Allowedemaildomains
        companySize:
          anyOf:
            - type: string
              maxLength: 32
            - type: 'null'
          title: Companysize
        defaultChatVisibility:
          anyOf:
            - type: string
            - type: 'null'
          title: Defaultchatvisibility
        defaultPersonaVisibility:
          anyOf:
            - type: string
            - type: 'null'
          title: Defaultpersonavisibility
        hitlThreshold:
          anyOf:
            - $ref: '#/components/schemas/HitlThreshold'
            - type: 'null'
      type: object
      title: UpdateOrganizationSettingsRequest
    PlanResponse:
      properties:
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        plan_credits:
          type: number
          title: Plan Credits
        topup_credits:
          type: number
          title: Topup Credits
        total_credits:
          type: number
          title: Total Credits
        used:
          type: number
          title: Used
        remaining:
          type: number
          title: Remaining
        percent_used:
          type: number
          title: Percent Used
        pool_status:
          $ref: '#/components/schemas/PoolStatus'
        members:
          items:
            $ref: '#/components/schemas/MemberResponse'
          type: array
          title: Members
          default: []
      type: object
      required:
        - organization_id
        - plan_credits
        - topup_credits
        - total_credits
        - used
        - remaining
        - percent_used
        - pool_status
      title: PlanResponse
      description: 'The Plans & Usage view: pool totals + per-member caps/usage.'
    UsageBreakdownResponse:
      properties:
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        by_team:
          items:
            $ref: '#/components/schemas/TeamBurn'
          type: array
          title: By Team
          default: []
      type: object
      required:
        - organization_id
      title: UsageBreakdownResponse
    PoolStatusResponse:
      properties:
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        status:
          $ref: '#/components/schemas/PoolStatus'
        percent_used:
          type: number
          title: Percent Used
        remaining:
          type: number
          title: Remaining
      type: object
      required:
        - organization_id
        - status
        - percent_used
        - remaining
      title: PoolStatusResponse
    SetCapRequest:
      properties:
        creditCap:
          anyOf:
            - type: number
            - type: 'null'
          title: Creditcap
      type: object
      title: SetCapRequest
    MemberResponse:
      properties:
        user_id:
          type: string
          title: User Id
        name:
