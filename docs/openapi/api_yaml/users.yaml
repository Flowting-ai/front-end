openapi: 3.1.0
info:
  title: FastAPI - Users
  version: 0.1.0
paths:
  /users/create:
    post:
      tags:
        - users
      summary: Create User
      operationId: create_user_users_create_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
        - HTTPBearer: []
  /users/me:
    get:
      tags:
        - users
      summary: Get Me
      operationId: get_me_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccountResponse'
      security:
        - HTTPBearer: []
    delete:
      tags:
        - users
      summary: Delete Me
      operationId: delete_me_users_me_delete
      responses:
        '204':
          description: Successful Response
      security:
        - HTTPBearer: []
    patch:
      tags:
        - users
      summary: Update Me
      operationId: update_me_users_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUser'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /users/me/onboarding:
    patch:
      tags:
        - users
      summary: Patch My Onboarding
      operationId: patch_my_onboarding_users_me_onboarding_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOnboarding'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSummary'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
components:
  schemas:
    CategoryUsage:
      properties:
        chat:
          type: number
          title: Chat
          default: 0
        persona:
          type: number
          title: Persona
          default: 0
        brain:
          type: number
          title: Brain
          default: 0
      type: object
      title: CategoryUsage
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    OnboardingSummary:
      properties:
        completed:
          type: boolean
          title: Completed
        user_role:
          anyOf:
            - type: string
            - type: 'null'
          title: User Role
        ai_tone:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Tone
        role_fit:
          anyOf:
            - type: string
            - type: 'null'
          title: Role Fit
      type: object
      required:
        - completed
      title: OnboardingSummary
    PlanSummary:
      properties:
        plan_type:
          anyOf:
            - type: string
            - type: 'null'
          title: Plan Type
        subscription_status:
          anyOf:
            - type: string
            - type: 'null'
          title: Subscription Status
        current_period_end:
          anyOf:
            - type: string
            - type: 'null'
          title: Current Period End
      type: object
      title: PlanSummary
    TrialSummary:
      properties:
        remaining:
          type: number
          title: Remaining
        expires_at:
          type: string
          title: Expires At
      type: object
      required:
        - remaining
        - expires_at
      title: TrialSummary
    UpdateOnboarding:
      properties:
        user_role:
          anyOf:
            - type: string
            - type: 'null'
          title: User Role
        ai_tone:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Tone
        role_fit:
          anyOf:
            - type: string
            - type: 'null'
          title: Role Fit
        onboarding_completed:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Onboarding Completed
      type: object
      title: UpdateOnboarding
    UpdateUser:
      properties:
        first_name:
          anyOf:
            - type: string
            - type: 'null'
          title: First Name
        last_name:
          anyOf:
            - type: string
            - type: 'null'
          title: Last Name
        nickname:
          anyOf:
            - type: string
            - type: 'null'
          title: Nickname
        phone_number:
          anyOf:
            - type: string
            - type: 'null'
          title: Phone Number
        profile_picture:
          anyOf:
            - type: string
            - type: 'null'
          title: Profile Picture
      type: object
      title: UpdateUser
    UsageResponse:
      properties:
        credits:
          type: number
          title: Credits
        plan_credits:
          type: number
          title: Plan Credits
          default: 0
        topup_credits:
          type: number
          title: Topup Credits
          default: 0
        used:
          type: number
          title: Used
          default: 0
        trial:
          anyOf:
            - $ref: '#/components/schemas/TrialSummary'
            - type: 'null'
        spent_this_period:
          type: number
          title: Spent This Period
          default: 0
        by_category:
          $ref: '#/components/schemas/CategoryUsage'
          default:
            chat: 0
            persona: 0
            brain: 0
      type: object
      required:
        - credits
      title: UsageResponse
    UserAccountResponse:
      properties:
        first_name:
          type: string
          title: First Name
        last_name:
          type: string
          title: Last Name
        nickname:
          anyOf:
            - type: string
            - type: 'null'
          title: Nickname
        email:
          type: string
          title: Email
        phone_number:
          anyOf:
            - type: string
            - type: 'null'
          title: Phone Number
        profile_picture:
          anyOf:
            - type: string
            - type: 'null'
          title: Profile Picture
        created_at:
          type: string
          format: date-time
          title: Created At
        active:
          type: boolean
          title: Active
        onboarding:
          $ref: '#/components/schemas/OnboardingSummary'
        plan:
          anyOf:
            - $ref: '#/components/schemas/PlanSummary'
            - type: 'null'
        usage:
          anyOf:
            - $ref: '#/components/schemas/UsageResponse'
            - type: 'null'
      type: object
      required:
        - first_name
        - last_name
        - email
        - created_at
        - active
        - onboarding
      title: UserAccountResponse
    UserResponse:
      properties:
        first_name:
          type: string
          title: First Name
        last_name:
          type: string
          title: Last Name
        nickname:
          anyOf:
            - type: string
            - type: 'null'
          title: Nickname
        email:
          type: string
          title: Email
        phone_number:
          anyOf:
            - type: string
            - type: 'null'
          title: Phone Number
        profile_picture:
          anyOf:
            - type: string
            - type: 'null'
          title: Profile Picture
        created_at:
          type: string
          format: date-time
          title: Created At
        active:
          type: boolean
          title: Active
        onboarding:
          $ref: '#/components/schemas/OnboardingSummary'
      type: object
      required:
        - first_name
        - last_name
        - email
        - created_at
        - active
        - onboarding
      title: UserResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
