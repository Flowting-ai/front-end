openapi: 3.1.0
info:
  title: FastAPI - Users
  version: 0.1.0
paths:
  /users/create:
    post:
      tags:
        - users
      summary: Create User
      operationId: create_user_users_create_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
        - HTTPBearer: []
  /users/me:
    get:
      tags:
        - users
      summary: Get Me
      operationId: get_me_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
        - HTTPBearer: []
    delete:
      tags:
        - users
      summary: Delete Me
      operationId: delete_me_users_me_delete
      responses:
        '204':
          description: Successful Response
      security:
        - HTTPBearer: []
    patch:
      tags:
        - users
      summary: Update Me
      operationId: update_me_users_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUser'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /users/me/onboarding:
    patch:
      tags:
        - users
      summary: Patch My Onboarding
      operationId: patch_my_onboarding_users_me_onboarding_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOnboarding'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSummary'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
components:
  schemas:
    CategoryUsage:
      properties:
        chat:
          type: number
          title: Chat
          default: 0
        persona:
          type: number
          title: Persona
          default: 0
      type: object
      title: CategoryUsage
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InvoiceInfo:
      properties:
        amount_paid:
          type: number
          title: Amount Paid
        currency:
          type: string
          title: Currency
        status:
          anyOf:
            - type: string
            - type: 'null'
          title: Status
        created:
          anyOf:
            - type: string
            - type: 'null'
          title: Created
        invoice_url:
          anyOf:
            - type: string
            - type: 'null'
          title: Invoice Url
        invoice_pdf:
          anyOf:
            - type: string
            - type: 'null'
          title: Invoice Pdf
      type: object
      required:
        - amount_paid
        - currency
      title: InvoiceInfo
    OnboardingSummary:
      properties:
        completed:
          type: boolean
          title: Completed
        user_role:
          anyOf:
            - type: string
            - type: 'null'
          title: User Role
        ai_tone:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Tone
        role_fit:
          anyOf:
            - type: string
            - type: 'null'
          title: Role Fit
      type: object
      required:
        - completed
      title: OnboardingSummary
    UpcomingInvoiceInfo:
      properties:
        amount_due:
          type: number
          title: Amount Due
        currency:
          type: string
          title: Currency
        next_payment_date:
          anyOf:
            - type: string
            - type: 'null'
          title: Next Payment Date
      type: object
      required:
        - amount_due
        - currency
      title: UpcomingInvoiceInfo
    UpdateOnboarding:
      properties:
        user_role:
          anyOf:
            - type: string
            - type: 'null'
          title: User Role
        ai_tone:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Tone
        role_fit:
          anyOf:
            - type: string
            - type: 'null'
          title: Role Fit
        onboarding_completed:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Onboarding Completed
      type: object
      title: UpdateOnboarding
    UpdateUser:
      properties:
        first_name:
          anyOf:
            - type: string
            - type: 'null'
          title: First Name
        last_name:
          anyOf:
            - type: string
            - type: 'null'
          title: Last Name
        phone_number:
          anyOf:
            - type: string
            - type: 'null'
          title: Phone Number
      type: object
      title: UpdateUser
    UsageResponse:
      properties:
        monthly_limit:
          type: number
          title: Monthly Limit
        monthly_used:
          type: number
          title: Monthly Used
        monthly_used_pct:
          type: number
          title: Monthly Used Pct
        bonus_credits:
          type: number
          title: Bonus Credits
          default: 0
        effective_limit:
          type: number
          title: Effective Limit
          default: 0
        by_category:
          $ref: '#/components/schemas/CategoryUsage'
          default:
            chat: 0
            persona: 0
      type: object
      required:
        - monthly_limit
        - monthly_used
        - monthly_used_pct
      title: UsageResponse
    UserResponse:
      properties:
        first_name:
          type: string
          title: First Name
        last_name:
          type: string
          title: Last Name
        email:
          type: string
          title: Email
        created_at:
          type: string
          format: date-time
          title: Created At
        active:
          type: boolean
          title: Active
        plan_type:
          anyOf:
            - type: string
            - type: 'null'
          title: Plan Type
        subscription_status:
          anyOf:
            - type: string
            - type: 'null'
          title: Subscription Status
        current_period_end:
          anyOf:
            - type: string
            - type: 'null'
          title: Current Period End
        cancel_at_period_end:
          type: boolean
          title: Cancel At Period End
          default: false
        invoices:
          items:
            $ref: '#/components/schemas/InvoiceInfo'
          type: array
          title: Invoices
          default: []
        upcoming_invoice:
          anyOf:
            - $ref: '#/components/schemas/UpcomingInvoiceInfo'
            - type: 'null'
        usage:
          anyOf:
            - $ref: '#/components/schemas/UsageResponse'
            - type: 'null'
        onboarding:
          anyOf:
            - $ref: '#/components/schemas/OnboardingSummary'
            - type: 'null'
      type: object
      required:
        - first_name
        - last_name
        - email
        - created_at
        - active
      title: UserResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
