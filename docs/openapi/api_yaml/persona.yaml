  /persona/{repo_id}/guide:
    post:
      tags:
        - persona
      summary: Guide
      description: |-
        Stream advice on improving a draft persona. The FE sends the current
        editor state (the version being edited); all saved versions of the repo are
        pulled in as context. The draft persona need not be saved.
      operationId: guide_persona__repo_id__guide_post
      security:
        - HTTPBearer: []
      parameters:
        - name: repo_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Repo Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaGuideRequest'
      responses:
        '200':
          description: |-
            Streaming persona chat response via Server-Sent Events.

            Two kinds of events arrive on the same SSE stream:

            **Named events** (`event: <name>\ndata: {...}`) — lifecycle, tools, model:

            - **`message_saved`**
            - **`title`**
            - **`web_search`**
            - **`image`**

            **Inline events** (`data: {"type":"<name>",...}`) — streaming LLM tokens, reasoning, tool execution:

            - **`reasoning_heading`**
            - **`reasoning_body`**
            - **`reasoning`**
            - **`content`**
            - **`done`**
            - **`error`**
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                type: string
                description: SSE stream
              x-sse-events:
                message_saved:
                  properties:
                    message_id:
                      title: Message Id
                      type: string
                  required:
                    - message_id
                  title: MessageSavedEvent
                  type: object
                title:
                  properties:
                    title:
                      title: Title
                      type: string
                  required:
                    - title
                  title: TitleEvent
                  type: object
                web_search:
                  properties:
                    query:
                      title: Query
                      type: string
                    links:
                      items: {}
                      title: Links
                      type: array
                  required:
                    - query
                    - links
                  title: WebSearchEvent
                  type: object
                image:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    plan_id:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Plan Id
                    step_id:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step Id
                  required:
                    - url
                    - s3_key
                  title: ImageEvent
                  type: object
                reasoning_heading:
                  description: |-
                    Opens a new reasoning section. Subsequent `reasoning_body` events
                    append to this section's body until the next `reasoning_heading`
                    or the first `content` event.
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: |-
                    Legacy: full raw reasoning text delta. Kept for backward compat —
                    new clients should use `reasoning_heading` + `reasoning_body` instead.
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ContentEvent
                  type: object
                done:
                  description: |-
                    End of an agentic round. The final `done` is followed by
                    `message_saved`. `finish_reason` of `length`, `incomplete`, or
                    `content_filter` indicates a truncated response.
                  properties:
                    type:
                      default: done
                      title: Type
                      type: string
                    usage:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Usage
                    reasoning_details:
                      anyOf:
                        - items: {}
                          type: array
                        - type: 'null'
                      title: Reasoning Details
                    tool_calls:
                      anyOf:
                        - items:
                            additionalProperties: true
                            type: object
                          type: array
                        - type: 'null'
                      title: Tool Calls
                    finish_reason:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Finish Reason
                  title: DoneEvent
                  type: object
                error:
                  description: Stream-level error. May still be followed by a final `done`.
                  properties:
                    type:
                      default: error
                      title: Type
                      type: string
                    error:
                      title: Error
                      type: string
                  required:
                    - error
                  title: ErrorEvent
                  type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
