                  title: ImageEvent
                  type: object
                reasoning_heading:
                  description: |-
                    Opens a new reasoning section. Subsequent `reasoning_body` events
                    append to this section's body until the next `reasoning_heading`
                    or the first `content` event.
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
