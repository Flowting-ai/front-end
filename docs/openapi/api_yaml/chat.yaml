                    message:
                      title: Message
                      type: string
                    filename:
                      title: Filename
                      type: string
                    code_preview:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                      - type: number
                      - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                      - type: number
                      - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                      - type: string
                      - type: 'null'
