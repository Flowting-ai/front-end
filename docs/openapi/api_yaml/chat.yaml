openapi: 3.1.0
info:
  title: FastAPI - Chat
  version: 0.1.0
paths:
  /chats:
    get:
      tags:
        - chat
      summary: Getchats
      operationId: getchats_chats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ChatsResponse'
                type: array
                title: Response Getchats Chats Get
      security:
        - HTTPBearer: []
    delete:
      tags:
        - chat
      summary: Remove Chat
      operationId: remove_chat_chats_delete
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteChat'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /chats/create:
    post:
      tags:
        - chat
      summary: Create New Chat
      operationId: create_new_chat_chats_create_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_create_new_chat_chats_create_post'
        required: true
      responses:
        '200':
          description: |-
            Streaming chat response via Server-Sent Events.

            Two kinds of events arrive on the same SSE stream:

            **Named events** (`event: <name>\ndata: {...}`) — lifecycle, tools, model:

            - **`message_saved`**
            - **`model_selected`**
            - **`title`**
            - **`web_search`**
            - **`image`**
            - **`generated_file`**
            - **`tool_progress`**
            - **`docx_progress`**
            - **`project_memory`**
            - **`tool_connect_prompt`**
            - **`user_prompt`**

            **Inline events** (`data: {"type":"<name>",...}`) — streaming LLM tokens, reasoning, tool execution:

            - **`reasoning_heading`**
            - **`reasoning_body`**
            - **`reasoning`**
            - **`content`**
            - **`tool_calls_streaming`**
            - **`tool_executing`**
            - **`tool_complete`**
            - **`done`**
            - **`error`**
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                type: string
                description: SSE stream
              x-sse-events:
                message_saved:
                  properties:
                    message_id:
                      title: Message Id
                      type: string
                  required:
                    - message_id
                  title: MessageSavedEvent
                  type: object
                model_selected:
                  properties:
                    model_id:
                      title: Model Id
                      type: string
                    model_name:
                      title: Model Name
                      type: string
                    deployment_name:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Deployment Name
                    company:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Company
                    complexity:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Complexity
                    thinking_enabled:
                      anyOf:
                        - type: boolean
                        - type: 'null'
                      title: Thinking Enabled
                    effort:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Effort
                  required:
                    - model_id
                    - model_name
                  title: ModelSelectedEvent
                  type: object
                title:
                  properties:
                    title:
                      title: Title
                      type: string
                  required:
                    - title
                  title: TitleEvent
                  type: object
                web_search:
                  properties:
                    query:
                      title: Query
                      type: string
                    links:
                      items: {}
                      title: Links
                      type: array
                  required:
                    - query
                    - links
                  title: WebSearchEvent
                  type: object
                image:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                  required:
                    - url
                    - s3_key
                  title: ImageEvent
                  type: object
                generated_file:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    filename:
                      title: Filename
                      type: string
                    mime_type:
                      title: Mime Type
                      type: string
                  required:
                    - url
                    - s3_key
                    - filename
                    - mime_type
                  title: GeneratedFileEvent
                  type: object
                tool_progress:
                  properties:
                    tool:
                      title: Tool
                      type: string
                    label:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Label
                    status:
                      title: Status
                      type: string
                    filename:
                      title: Filename
                      type: string
                    step:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step
                    message:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Message
                    code_preview:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Detail
                  required:
                    - tool
                    - status
                    - filename
                  title: ToolProgressEvent
                  type: object
                docx_progress:
                  properties:
                    label:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Label
                    step:
                      title: Step
                      type: string
                    message:
                      title: Message
                      type: string
                    filename:
                      title: Filename
                      type: string
                    code_preview:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Detail
                  required:
                    - step
                    - message
                    - filename
                  title: DocxProgressEvent
                  type: object
                project_memory:
                  properties:
                    entry_id:
                      title: Entry Id
                      type: string
                    project_id:
                      title: Project Id
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - entry_id
                    - project_id
                    - content
                  title: ProjectMemoryEvent
                  type: object
                tool_connect_prompt:
                  description: |-
                    The model called a connector tool for an app the user hasn't linked.
                    The UI renders a 'Connect <App>' button; clicking it opens the OAuth or
                    API-key flow, then the user resends their message.
                  properties:
                    connector_slug:
                      title: Connector Slug
                      type: string
                    display_name:
                      title: Display Name
                      type: string
                    auth_mode:
                      title: Auth Mode
                      type: string
                    tool_name:
                      title: Tool Name
                      type: string
                    request_id:
                      title: Request Id
                      type: string
                  required:
                    - connector_slug
                    - display_name
                    - auth_mode
                    - tool_name
                    - request_id
                  title: ToolConnectPromptEvent
                  type: object
                user_prompt:
                  description: |-
                    Generic mid-stream "the model is asking the user something" event.

                    The same event handles connector permission asks, plan approvals,
                    destructive-action confirmations, and free-text clarifications.
                    Backend code calls `core.prompt_gate.ask_user(...)` which emits this
                    event and blocks until the FE POSTs to `respond_url`.

                    Fields:
                      prompt_id    — UUID; FE POSTs to /chats/prompts/{prompt_id}.
                      kind         — "permission" | "confirm" | "choice" | "input".
                      title        — headline rendered in the assistant message.
                      description  — optional longer body.
                      options      — for choice-style kinds, [{value, label, style?}].
                      metadata     — kind-specific context (e.g. {connector_slug, tool_slug,
                                     suggested_args} for permission asks). FE renders or
                                     ignores per its UI.
                      respond_url  — server-built path to POST the response to.
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    kind:
                      title: Kind
                      type: string
                    title:
                      title: Title
                      type: string
                    description:
                      default: ''
                      title: Description
                      type: string
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                    metadata:
                      additionalProperties: true
                      default: {}
                      title: Metadata
                      type: object
                    respond_url:
                      default: ''
                      title: Respond Url
                      type: string
                  required:
                    - prompt_id
                    - kind
                    - title
                  title: UserPromptEvent
                  type: object
                reasoning_heading:
                  description: |-
                    Opens a new reasoning section. Subsequent `reasoning_body` events
                    append to this section's body until the next `reasoning_heading`
                    or the first `content` event.
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: |-
                    Legacy: full raw reasoning text delta. Kept for backward compat —
                    new clients should use `reasoning_heading` + `reasoning_body` instead.
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ContentEvent
                  type: object
                tool_calls_streaming:
                  description: |-
                    Tool name + argument fragments arriving live, before tool execution
                    starts. UX hint so the frontend can show 'Calling X…'.
                  properties:
                    type:
                      default: tool_calls_streaming
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Tool Call
                  required:
                    - content
                  title: ToolCallsStreamingEvent
                  type: object
                tool_executing:
                  description: Tool just started running (after args fully streamed and parsed).
                  properties:
                    type:
                      default: tool_executing
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolExecutingEvent
                  type: object
                tool_complete:
                  description: Tool finished. `tool_call.result` is a string preview (capped 8KB).
                  properties:
                    type:
                      default: tool_complete
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolCompleteEvent
                  type: object
                done:
                  description: |-
                    End of an agentic round. The final `done` is followed by
                    `message_saved`. `finish_reason` of `length`, `incomplete`, or
                    `content_filter` indicates a truncated response.
                  properties:
                    type:
                      default: done
                      title: Type
                      type: string
                    usage:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Usage
                    reasoning_details:
                      anyOf:
                        - items: {}
                          type: array
                        - type: 'null'
                      title: Reasoning Details
                    tool_calls:
                      anyOf:
                        - items:
                            additionalProperties: true
                            type: object
                          type: array
                        - type: 'null'
                      title: Tool Calls
                    finish_reason:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Finish Reason
                  title: DoneEvent
                  type: object
                error:
                  description: Stream-level error. May still be followed by a final `done`.
                  properties:
                    type:
                      default: error
                      title: Type
                      type: string
                    error:
                      title: Error
                      type: string
                  required:
                    - error
                  title: ErrorEvent
                  type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /chats/{chat_id}/messages:
    get:
      tags:
        - chat
      summary: Get Messages
      operationId: get_messages_chats__chat_id__messages_get
      security:
        - HTTPBearer: []
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Chat Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetMessages'
                title: Response Get Messages Chats  Chat Id  Messages Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
