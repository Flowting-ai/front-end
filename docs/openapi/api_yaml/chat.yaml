                    label:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Label
                    status:
                      title: Status
                      type: string
                    filename:
                      title: Filename
                      type: string
                    step:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Step
                    message:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Message
                    code_preview:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                      - type: number
                      - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                      - type: number
                      - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Detail
                  required:
                  - tool
                  - status
                  - filename
                  title: ToolProgressEvent
                  type: object
                docx_progress:
