components:
  schemas:
    Body_create_new_chat_chats_create_post:
      properties:
        input:
          type: string
          title: Input
        model_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Model Id
        algorithm:
          anyOf:
          - type: string
          - type: 'null'
          title: Algorithm
        pin_ids:
          anyOf:
          - type: string
          - type: 'null'
          title: Pin Ids
        use_mistral_ocr:
          type: boolean
          title: Use Mistral Ocr
          default: false
        system_instruction:
          anyOf:
          - type: string
          - type: 'null'
          title: System Instruction
        project_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Project Id
        files:
          anyOf:
          - items:
              type: string
              contentMediaType: application/octet-stream
            type: array
          - type: 'null'
          title: Files
      type: object
      required:
