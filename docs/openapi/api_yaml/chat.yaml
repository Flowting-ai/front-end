                    type:
                      default: done
                      title: Type
                      type: string
                    usage:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Usage
                    reasoning_details:
                      anyOf:
                        - items: {}
                          type: array
                        - type: 'null'
                      title: Reasoning Details
                    tool_calls:
                      anyOf:
                        - items:
                            additionalProperties: true
                            type: object
                          type: array
                        - type: 'null'
                      title: Tool Calls
                    finish_reason:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Finish Reason
                  title: DoneEvent
                  type: object
                error:
                  description: Stream-level error. May still be followed by a final `done`.
                  properties:
                    type:
                      default: error
                      title: Type
                      type: string
                    error:
                      title: Error
                      type: string
                  required:
                    - error
                  title: ErrorEvent
                  type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
