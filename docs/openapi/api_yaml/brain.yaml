            - **`web_search`**
            - **`image`**
            - **`generated_file`**
            - **`tool_progress`**
            - **`tool_connect_prompt`**
            - **`user_prompt`**
            - **`question_prompt`**
            - **`permission_prompt`**
            - **`context`**
            - **`plan_proposed`**
            - **`plan_approved`**
            - **`plan_countered`**
            - **`plan_cancelled`**
            - **`step_started`**
