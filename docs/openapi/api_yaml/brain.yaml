                    title:
                      title: Title
                      type: string
                  required:
                    - title
                  title: TitleEvent
                  type: object
                web_search:
                  properties:
                    query:
                      title: Query
                      type: string
                    links:
                      items: {}
                      title: Links
                      type: array
                  required:
                    - query
                    - links
                  title: WebSearchEvent
                  type: object
                image:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    plan_id:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Plan Id
                    step_id:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step Id
                  required:
                    - url
                    - s3_key
                  title: ImageEvent
                  type: object
                generated_file:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    filename:
                      title: Filename
                      type: string
                    mime_type:
                      title: Mime Type
                      type: string
                    file_size:
                      title: File Size
                      type: integer
                  required:
                    - url
                    - s3_key
                    - filename
                    - mime_type
                    - file_size
                  title: GeneratedFileEvent
                  type: object
                tool_progress:
                  properties:
                    tool:
                      title: Tool
                      type: string
                    label:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Label
                    status:
                      title: Status
                      type: string
                    filename:
                      title: Filename
                      type: string
                    step:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step
                    message:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Message
                    code_preview:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Detail
                  required:
                    - tool
                    - status
                    - filename
                  title: ToolProgressEvent
                  type: object
                tool_connect_prompt:
                  description: |-
