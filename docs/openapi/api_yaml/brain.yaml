                    Resolve by POSTing to `respond_url` with
                    `{"response": {"answers": {question_id: value}}}`.
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    respond_url:
                      title: Respond Url
                      type: string
                    title:
                      default: ''
                      title: Title
                      type: string
                    description:
                      default: ''
                      title: Description
                      type: string
                    questions:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Questions
                      type: array
                  required:
                    - prompt_id
                    - respond_url
                  title: QuestionPromptEvent
                  type: object
                permission_prompt:
                  description: |-
                    The assistant wants to run a connector action whose per-tool policy
                    is `ask`. Dedicated replacement for `user_prompt` kind=permission.

                    Resolve by POSTing to `respond_url` with
                    `{"response": "allow" | "allow_once" | "block"}` (a plain string).
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    respond_url:
                      title: Respond Url
                      type: string
                    connector_slug:
                      title: Connector Slug
                      type: string
                    display_name:
                      title: Display Name
                      type: string
                    tool_slug:
                      title: Tool Slug
                      type: string
                    suggested_args:
                      additionalProperties: true
                      default: {}
                      title: Suggested Args
                      type: object
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                  required:
                    - prompt_id
                    - respond_url
                    - connector_slug
                    - display_name
                    - tool_slug
                  title: PermissionPromptEvent
                  type: object
                context:
                  description: |-
                    Snapshot of EVERYTHING that's in context for this turn — what the
                    assistant can see / reach. Fires once at the start of a Brain turn
                    so the FE can populate its context sidebar before any plan / content
                    events arrive.

                    Fields are intentionally broad and optional so new context sources
                    (skills, projects, files, custom blocks) can be added without
                    breaking older FE consumers.
                  properties:
                    persona:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Persona
                    user_context:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: User Context
                    pins:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Pins
                      type: array
                    files:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Files
                      type: array
                    connectors:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Connectors
                      type: array
                    available_models:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Available Models
                      type: array
                    project:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Project
                    documents:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Documents
                      type: array
                    loaded_skills:
                      default: []
                      items:
                        type: string
                      title: Loaded Skills
                      type: array
                  title: ContextEvent
                  type: object
                plan_proposed:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                    summary:
                      title: Summary
                      type: string
                    steps:
                      items:
                        additionalProperties: true
                        type: object
                      title: Steps
                      type: array
                    edges:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Edges
                      type: array
                    plan_text:
                      default: ''
                      title: Plan Text
                      type: string
                    required_connectors:
                      default: []
                      items:
                        type: string
                      title: Required Connectors
                      type: array
                  required:
                    - plan_id
                    - summary
                    - steps
                  title: PlanProposedEvent
                  type: object
                plan_approved:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                  required:
                    - plan_id
                  title: PlanApprovedEvent
                  type: object
                plan_countered:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                    counter_text:
                      title: Counter Text
                      type: string
                  required:
                    - plan_id
                    - counter_text
                  title: PlanCounteredEvent
                  type: object
                plan_cancelled:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                  required:
                    - plan_id
                  title: PlanCancelledEvent
                  type: object
                step_started:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                    step_id:
                      title: Step Id
                      type: string
                  required:
                    - plan_id
                    - step_id
                  title: StepStartedEvent
                  type: object
                step_completed:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                    step_id:
                      title: Step Id
                      type: string
                  required:
                    - plan_id
                    - step_id
                  title: StepCompletedEvent
                  type: object
                step_failed:
                  properties:
                    plan_id:
                      title: Plan Id
                      type: string
                    step_id:
                      title: Step Id
                      type: string
                    error:
                      title: Error
                      type: string
                  required:
                    - plan_id
                    - step_id
                    - error
                  title: StepFailedEvent
                  type: object
                reasoning_heading:
                  description: |-
                    Opens a new reasoning section. Subsequent `reasoning_body` events
                    append to this section's body until the next `reasoning_heading`
                    or the first `content` event.
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: |-
                    Legacy: full raw reasoning text delta. Kept for backward compat —
                    new clients should use `reasoning_heading` + `reasoning_body` instead.
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ContentEvent
                  type: object
                tool_calls_streaming:
                  description: |-
                    Tool name + argument fragments arriving live, before tool execution
                    starts. UX hint so the frontend can show 'Calling X…'.
                  properties:
                    type:
                      default: tool_calls_streaming
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Tool Call
                  required:
                    - content
                  title: ToolCallsStreamingEvent
                  type: object
                tool_executing:
                  description: Tool just started running (after args fully streamed and parsed).
                  properties:
                    type:
                      default: tool_executing
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolExecutingEvent
                  type: object
                tool_complete:
                  description: Tool finished. `tool_call.result` is a string preview (capped 8KB).
                  properties:
                    type:
                      default: tool_complete
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolCompleteEvent
                  type: object
                done:
                  description: |-
                    End of an agentic round. The final `done` is followed by
                    `message_saved`. `finish_reason` of `length`, `incomplete`, or
                    `content_filter` indicates a truncated response.
                  properties:
                    type:
                      default: done
                      title: Type
                      type: string
                    usage:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Usage
                    reasoning_details:
                      anyOf:
                        - items: {}
                          type: array
                        - type: 'null'
                      title: Reasoning Details
                    tool_calls:
                      anyOf:
                        - items:
                            additionalProperties: true
                            type: object
                          type: array
                        - type: 'null'
                      title: Tool Calls
                    finish_reason:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Finish Reason
                  title: DoneEvent
                  type: object
                error:
                  description: Stream-level error. May still be followed by a final `done`.
                  properties:
                    type:
                      default: error
                      title: Type
                      type: string
                    error:
                      title: Error
                      type: string
                  required:
                    - error
                  title: ErrorEvent
                  type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /brain/{chat_id}/messages:
