                      type: string
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                    metadata:
                      additionalProperties: true
                      default: {}
                      title: Metadata
                      type: object
                    respond_url:
                      default: ''
                      title: Respond Url
                      type: string
                  required:
                    - prompt_id
                    - kind
                    - title
                  title: UserPromptEvent
                  type: object
                question_prompt:
