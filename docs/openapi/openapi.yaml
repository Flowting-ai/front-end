                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step Id
                  required:
                    - url
                    - s3_key
                  title: ImageEvent
                  type: object
                generated_file:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    filename:
                      title: Filename
                      type: string
                    mime_type:
                      title: Mime Type
                      type: string
                    file_size:
                      title: File Size
                      type: integer
                  required:
                    - url
                    - s3_key
                    - filename
                    - mime_type
                    - file_size
                  title: GeneratedFileEvent
                  type: object
                tool_progress:
                  properties:
                    tool:
                      title: Tool
                      type: string
                    label:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Label
                    status:
                      title: Status
                      type: string
                    filename:
                      title: Filename
                      type: string
                    step:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step
                    message:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Message
                    code_preview:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Detail
                  required:
                    - tool
                    - status
                    - filename
                  title: ToolProgressEvent
                  type: object
                docx_progress:
                  properties:
                    label:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Label
                    step:
                      title: Step
                      type: string
                    message:
                      title: Message
                      type: string
                    filename:
                      title: Filename
                      type: string
                    code_preview:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                        - type: number
                        - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Detail
                  required:
                    - step
                    - message
                    - filename
                  title: DocxProgressEvent
                  type: object
                memory_updated:
                  description: |-
                    Emitted when user_memory or project_memory has been replaced by an LLM
                    tool call. `scope` is 'user' or 'project'; `scope_id` is the auth0_id or
                    project_id (as string). `version` is the new opaque CAS counter.
                  properties:
                    scope:
                      title: Scope
                      type: string
                    scope_id:
                      title: Scope Id
                      type: string
                    memory:
                      title: Memory
                      type: string
                    version:
                      title: Version
                      type: integer
                  required:
                    - scope
                    - scope_id
                    - memory
                    - version
                  title: MemoryUpdatedEvent
                  type: object
                tool_connect_prompt:
                  description: |-
                    The model called a connector tool for an app the user hasn't linked.
                    The UI renders a 'Connect <App>' button; clicking it opens the OAuth or
                    API-key flow, then the user resends their message.
                  properties:
                    connector_slug:
                      title: Connector Slug
                      type: string
                    display_name:
                      title: Display Name
                      type: string
                    auth_mode:
                      title: Auth Mode
                      type: string
                    tool_name:
                      title: Tool Name
                      type: string
                    request_id:
                      title: Request Id
                      type: string
                  required:
                    - connector_slug
                    - display_name
                    - auth_mode
                    - tool_name
                    - request_id
                  title: ToolConnectPromptEvent
                  type: object
                user_prompt:
                  description: |-
                    Generic mid-stream "the model is asking the user something" event.

                    The same event handles connector permission asks, plan approvals,
                    destructive-action confirmations, and free-text clarifications.
                    Backend code calls `core.prompt_gate.ask_user(...)` which emits this
                    event and blocks until the FE POSTs to `respond_url`.

                    Fields:
                      prompt_id    — UUID; FE POSTs to /chats/prompts/{prompt_id}.
                      kind         — "permission" | "confirm" | "choice" | "input".
                      title        — headline rendered in the assistant message.
                      description  — optional longer body.
                      options      — for choice-style kinds, [{value, label, style?}].
                      metadata     — kind-specific context (e.g. {connector_slug, tool_slug,
                                     suggested_args} for permission asks). FE renders or
                                     ignores per its UI.
                      respond_url  — server-built path to POST the response to.
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    kind:
                      title: Kind
                      type: string
                    title:
                      title: Title
                      type: string
                    description:
                      default: ''
                      title: Description
                      type: string
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                    metadata:
                      additionalProperties: true
                      default: {}
                      title: Metadata
                      type: object
                    respond_url:
                      default: ''
                      title: Respond Url
                      type: string
                  required:
                    - prompt_id
                    - kind
                    - title
                  title: UserPromptEvent
                  type: object
                question_prompt:
                  description: |-
                    The assistant is asking the user one or more clarifying questions.

                    Dedicated, fully-typed replacement for `user_prompt` kind=questions.
                    Resolve by POSTing to `respond_url` with
                    `{"response": {"answers": {question_id: value}}}`.
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    respond_url:
                      title: Respond Url
                      type: string
                    title:
                      default: ''
                      title: Title
                      type: string
                    description:
                      default: ''
                      title: Description
                      type: string
                    questions:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Questions
                      type: array
                  required:
                    - prompt_id
                    - respond_url
                  title: QuestionPromptEvent
                  type: object
                permission_prompt:
                  description: |-
                    The assistant wants to run a connector action whose per-tool policy
                    is `ask`. Dedicated replacement for `user_prompt` kind=permission.

                    Resolve by POSTing to `respond_url` with
                    `{"response": "allow" | "allow_once" | "block"}` (a plain string).
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    respond_url:
                      title: Respond Url
                      type: string
                    connector_slug:
                      title: Connector Slug
                      type: string
                    display_name:
                      title: Display Name
                      type: string
                    tool_slug:
                      title: Tool Slug
                      type: string
                    suggested_args:
                      additionalProperties: true
                      default: {}
                      title: Suggested Args
                      type: object
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                  required:
                    - prompt_id
                    - respond_url
                    - connector_slug
                    - display_name
                    - tool_slug
                  title: PermissionPromptEvent
                  type: object
                reasoning_heading:
                  description: |-
                    Opens a new reasoning section. Subsequent `reasoning_body` events
                    append to this section's body until the next `reasoning_heading`
                    or the first `content` event.
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: |-
                    Legacy: full raw reasoning text delta. Kept for backward compat —
                    new clients should use `reasoning_heading` + `reasoning_body` instead.
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ContentEvent
                  type: object
                tool_calls_streaming:
                  description: |-
