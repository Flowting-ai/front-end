  /persona/{repo_id}/chats/create:
    post:
      tags:
      - persona
      summary: Create Repo Chat
      operationId: create_repo_chat_persona__repo_id__chats_create_post
      security:
      - HTTPBearer: []
      parameters:
      - name: repo_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Repo Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_create_repo_chat_persona__repo_id__chats_create_post'
      responses:
        '200':
          description: "Streaming persona chat response via Server-Sent Events.\n\n\
            Two kinds of events arrive on the same SSE stream:\n\n**Named events**\
            \ (`event: <name>\\ndata: {...}`) \u2014 lifecycle, tools, model:\n\n\
            - **`message_saved`**\n- **`title`**\n- **`web_search`**\n- **`image`**\n\
            \n**Inline events** (`data: {\"type\":\"<name>\",...}`) \u2014 streaming\
            \ LLM tokens, reasoning, tool execution:\n\n- **`reasoning_heading`**\n\
            - **`reasoning_body`**\n- **`reasoning`**\n- **`content`**\n- **`done`**\n\
            - **`error`**"
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                type: string
                description: SSE stream
              x-sse-events:
                message_saved:
                  properties:
                    message_id:
                      title: Message Id
                      type: string
                  required:
                  - message_id
                  title: MessageSavedEvent
                  type: object
                title:
                  properties:
                    title:
                      title: Title
                      type: string
                  required:
                  - title
                  title: TitleEvent
                  type: object
                web_search:
                  properties:
                    query:
                      title: Query
                      type: string
                    links:
                      items: {}
                      title: Links
                      type: array
                  required:
                  - query
                  - links
                  title: WebSearchEvent
                  type: object
                image:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                  required:
                  - url
                  - s3_key
                  title: ImageEvent
                  type: object
                reasoning_heading:
                  description: 'Opens a new reasoning section. Subsequent `reasoning_body`
                    events

                    append to this section''s body until the next `reasoning_heading`

                    or the first `content` event.'
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's
                    body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: "Legacy: full raw reasoning text delta. Kept for backward\
                    \ compat \u2014\nnew clients should use `reasoning_heading` +\
                    \ `reasoning_body` instead."
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into
                    the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ContentEvent
                  type: object
                done:
                  description: 'End of an agentic round. The final `done` is followed
                    by

                    `message_saved`. `finish_reason` of `length`, `incomplete`, or

                    `content_filter` indicates a truncated response.'
                  properties:
                    type:
                      default: done
                      title: Type
                      type: string
                    usage:
                      anyOf:
                      - additionalProperties: true
                        type: object
                      - type: 'null'
                      title: Usage
                    reasoning_details:
                      anyOf:
                      - items: {}
                        type: array
                      - type: 'null'
                      title: Reasoning Details
                    tool_calls:
                      anyOf:
                      - items:
                          additionalProperties: true
                          type: object
                        type: array
                      - type: 'null'
                      title: Tool Calls
                    finish_reason:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Finish Reason
                  title: DoneEvent
                  type: object
                error:
                  description: Stream-level error. May still be followed by a final
                    `done`.
                  properties:
                    type:
                      default: error
                      title: Type
                      type: string
                    error:
                      title: Error
                      type: string
                  required:
                  - error
                  title: ErrorEvent
                  type: object
                tool_error:
                  description: A tool handler raised. The model receives the error
                    string and may recover; the client gets this event so the UI
                    can show which tool failed and why. Stream continues — a final
                    `done` (or `error`) still arrives.
                  properties:
                    type:
                      default: tool_error
                      title: Type
                      type: string
                    content:
                      title: Tool Name
                      type: string
                      description: Name of the tool that failed (e.g. `read_pages`,
                        `retrieve_document`).
                    error:
                      title: Error
                      type: string
                  required:
                  - content
                  - error
                  title: ToolErrorEvent
                  type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
