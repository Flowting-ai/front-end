                content:
                  description: Token of the assistant's visible answer. Concat into
                    the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ContentEvent
                  type: object
                done:
                  description: 'End of an agentic round. The final `done` is followed
                    by

                    `message_saved`. `finish_reason` of `length`, `incomplete`, or

                    `content_filter` indicates a truncated response.'
                  properties:
                    type:
