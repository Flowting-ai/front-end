  /brain/create:
    post:
      tags:
        - brain
      summary: Create Brain Chat
      operationId: create_brain_chat_brain_create_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_create_brain_chat_brain_create_post'
        required: true
      responses:
        '200':
          description: |-
            Streaming Brain orchestrator response via Server-Sent Events.

            Two kinds of events arrive on the same SSE stream:

            **Named events** (`event: <name>\ndata: {...}`) — lifecycle, tools, model:

            - **`message_saved`**
            - **`title`**
            - **`web_search`**
            - **`image`**
            - **`generated_file`**
            - **`tool_progress`**
            - **`tool_connect_prompt`**
            - **`user_prompt`**
            - **`question_prompt`**
            - **`permission_prompt`**
            - **`context`**
            - **`plan_proposed`**
            - **`plan_approved`**
            - **`plan_countered`**
            - **`plan_cancelled`**
            - **`step_started`**
            - **`step_completed`**
            - **`step_failed`**

            **Inline events** (`data: {"type":"<name>",...}`) — streaming LLM tokens, reasoning, tool execution:

