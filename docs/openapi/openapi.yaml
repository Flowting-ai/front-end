                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      anyOf:
                        - additionalProperties: true
                          type: object
                        - type: 'null'
                      title: Tool Call
                  required:
                    - content
                  title: ToolCallsStreamingEvent
                  type: object
                tool_executing:
                  description: Tool just started running (after args fully streamed and parsed).
                  properties:
                    type:
                      default: tool_executing
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolExecutingEvent
                  type: object
                tool_complete:
                  description: Tool finished. `tool_call.result` is a string preview (capped 8KB).
                  properties:
                    type:
                      default: tool_complete
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
