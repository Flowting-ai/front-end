                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: "Legacy: full raw reasoning text delta. Kept for backward\
                    \ compat \u2014\nnew clients should use `reasoning_heading` +\
                    \ `reasoning_body` instead."
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningEvent
