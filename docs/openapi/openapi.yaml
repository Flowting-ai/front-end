                  properties:
                    type:
                      default: tool_executing
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolExecutingEvent
                  type: object
                tool_complete:
                  description: Tool finished. `tool_call.result` is a string preview (capped 8KB).
                  properties:
                    type:
                      default: tool_complete
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                    - content
                    - tool_call
                  title: ToolCompleteEvent
                  type: object
                done:
