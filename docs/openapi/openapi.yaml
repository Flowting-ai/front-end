                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    kind:
                      title: Kind
                      type: string
                    title:
                      title: Title
                      type: string
                    description:
                      default: ''
                      title: Description
                      type: string
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                    metadata:
                      additionalProperties: true
                      default: {}
                      title: Metadata
                      type: object
                    respond_url:
                      default: ''
                      title: Respond Url
                      type: string
                  required:
                  - prompt_id
                  - kind
                  - title
                  title: UserPromptEvent
                  type: object
                question_prompt:
                  description: 'The assistant is asking the user one or more clarifying questions.


                    Dedicated, fully-typed replacement for `user_prompt` kind=questions.

                    Resolve by POSTing to `respond_url` with

                    `{"response": {"answers": {question_id: value}}}`.'
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    respond_url:
                      title: Respond Url
                      type: string
                    title:
                      default: ''
                      title: Title
                      type: string
                    description:
                      default: ''
                      title: Description
                      type: string
                    questions:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Questions
                      type: array
                  required:
                  - prompt_id
                  - respond_url
                  title: QuestionPromptEvent
                  type: object
                permission_prompt:
                  description: 'The assistant wants to run a connector action whose per-tool policy

                    is `ask`. Dedicated replacement for `user_prompt` kind=permission.


                    Resolve by POSTing to `respond_url` with

                    `{"response": "allow" | "allow_once" | "block"}` (a plain string).'
                  properties:
                    prompt_id:
                      title: Prompt Id
                      type: string
                    respond_url:
                      title: Respond Url
                      type: string
                    connector_slug:
                      title: Connector Slug
                      type: string
                    display_name:
                      title: Display Name
                      type: string
                    tool_slug:
                      title: Tool Slug
                      type: string
                    suggested_args:
                      additionalProperties: true
                      default: {}
                      title: Suggested Args
                      type: object
                    options:
                      default: []
                      items:
                        additionalProperties: true
                        type: object
                      title: Options
                      type: array
                  required:
                  - prompt_id
                  - respond_url
                  - connector_slug
                  - display_name
                  - tool_slug
                  title: PermissionPromptEvent
                  type: object
                reasoning_heading:
                  description: 'Opens a new reasoning section. Subsequent `reasoning_body` events

                    append to this section''s body until the next `reasoning_heading`

                    or the first `content` event.'
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: 'Legacy: full raw reasoning text delta. Kept for backward compat —

                    new clients should use `reasoning_heading` + `reasoning_body` instead.'
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                  - content
                  title: ContentEvent
                  type: object
                tool_calls_streaming:
                  description: 'Tool name + argument fragments arriving live, before tool execution

                    starts. UX hint so the frontend can show ''Calling X…''.'
                  properties:
                    type:
                      default: tool_calls_streaming
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      anyOf:
                      - additionalProperties: true
                        type: object
                      - type: 'null'
                      title: Tool Call
                  required:
                  - content
                  title: ToolCallsStreamingEvent
                  type: object
                tool_executing:
                  description: Tool just started running (after args fully streamed and parsed).
                  properties:
                    type:
                      default: tool_executing
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                  - content
                  - tool_call
                  title: ToolExecutingEvent
                  type: object
                tool_complete:
                  description: Tool finished. `tool_call.result` is a string preview (capped 8KB).
                  properties:
                    type:
                      default: tool_complete
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                    tool_call:
                      additionalProperties: true
                      title: Tool Call
                      type: object
                  required:
                  - content
