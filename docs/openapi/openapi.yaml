                      type: string
                    links:
                      items: {}
                      title: Links
                      type: array
                  required:
                    - query
                    - links
                  title: WebSearchEvent
                  type: object
                image:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    plan_id:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Plan Id
                    step_id:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Step Id
                  required:
                    - url
                    - s3_key
                  title: ImageEvent
                  type: object
                reasoning_heading:
                  description: |-
                    Opens a new reasoning section. Subsequent `reasoning_body` events
                    append to this section's body until the next `reasoning_heading`
                    or the first `content` event.
                  properties:
                    type:
                      default: reasoning_heading
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningHeadingEvent
                  type: object
                reasoning_body:
                  description: Appends a delta to the current reasoning section's body.
                  properties:
                    type:
                      default: reasoning_body
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningBodyEvent
                  type: object
                reasoning:
                  description: |-
                    Legacy: full raw reasoning text delta. Kept for backward compat —
                    new clients should use `reasoning_heading` + `reasoning_body` instead.
                  properties:
                    type:
                      default: reasoning
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ReasoningEvent
                  type: object
                content:
                  description: Token of the assistant's visible answer. Concat into the answer text.
                  properties:
                    type:
                      default: content
                      title: Type
                      type: string
                    content:
                      title: Content
                      type: string
                  required:
                    - content
                  title: ContentEvent
                  type: object
                done:
                  description: |-
                    End of an agentic round. The final `done` is followed by
