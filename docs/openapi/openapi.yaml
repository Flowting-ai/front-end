                    model_name:
                      title: Model Name
                      type: string
                    deployment_name:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Deployment Name
                    company:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Company
                    complexity:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Complexity
                    thinking_enabled:
                      anyOf:
                        - type: boolean
                        - type: 'null'
                      title: Thinking Enabled
                    effort:
                      anyOf:
                        - type: string
                        - type: 'null'
                      title: Effort
                  required:
                    - model_id
                    - model_name
                  title: ModelSelectedEvent
                  type: object
                title:
