  /brain/{chat_id}/stream:
    post:
      tags:
      - brain
      summary: Stream Brain Message
      operationId: stream_brain_message_brain__chat_id__stream_post
      security:
      - HTTPBearer: []
      parameters:
      - name: chat_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Chat Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_stream_brain_message_brain__chat_id__stream_post'
      responses:
        '200':
          description: 'Streaming Brain orchestrator response via Server-Sent Events.


            Two kinds of events arrive on the same SSE stream:


            **Named events** (`event: <name>\ndata: {...}`) — lifecycle, tools, model:


            - **`message_saved`**

            - **`title`**

            - **`web_search`**

            - **`image`**

            - **`generated_file`**

            - **`tool_progress`**

            - **`tool_connect_prompt`**

            - **`user_prompt`**

            - **`question_prompt`**

            - **`permission_prompt`**

            - **`context`**

            - **`plan_proposed`**

            - **`plan_approved`**

            - **`plan_countered`**

            - **`plan_cancelled`**

            - **`step_started`**

            - **`step_completed`**

            - **`step_failed`**

            - **`step_content`**

            - **`step_reasoning`**


            **Inline events** (`data: {"type":"<name>",...}`) — streaming LLM tokens, reasoning, tool execution:


            - **`reasoning_heading`**

            - **`reasoning_body`**

            - **`reasoning`**

            - **`content`**

            - **`tool_calls_streaming`**

            - **`tool_executing`**

            - **`tool_complete`**

            - **`done`**

            - **`error`**'
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                type: string
                description: SSE stream
              x-sse-events:
                message_saved:
                  properties:
                    message_id:
                      title: Message Id
                      type: string
                  required:
                  - message_id
                  title: MessageSavedEvent
                  type: object
                title:
                  properties:
                    title:
                      title: Title
                      type: string
                  required:
                  - title
                  title: TitleEvent
                  type: object
                web_search:
                  properties:
                    query:
                      title: Query
                      type: string
                    links:
                      items: {}
                      title: Links
                      type: array
                  required:
                  - query
                  - links
                  title: WebSearchEvent
                  type: object
                image:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    plan_id:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Plan Id
                    step_id:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Step Id
                  required:
                  - url
                  - s3_key
                  title: ImageEvent
                  type: object
                generated_file:
                  properties:
                    url:
                      title: Url
                      type: string
                    s3_key:
                      title: S3 Key
                      type: string
                    filename:
                      title: Filename
                      type: string
                    mime_type:
                      title: Mime Type
                      type: string
                    file_size:
                      title: File Size
                      type: integer
                  required:
                  - url
                  - s3_key
                  - filename
                  - mime_type
                  - file_size
                  title: GeneratedFileEvent
                  type: object
                tool_progress:
                  properties:
                    tool:
                      title: Tool
                      type: string
                    label:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Label
                    status:
                      title: Status
                      type: string
                    filename:
                      title: Filename
                      type: string
                    step:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Step
                    message:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Message
                    code_preview:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Code Preview
                    elapsed_seconds:
                      anyOf:
                      - type: number
                      - type: 'null'
                      title: Elapsed Seconds
                    percent:
                      anyOf:
                      - type: number
                      - type: 'null'
                      title: Percent
                    detail:
                      anyOf:
                      - type: string
                      - type: 'null'
                      title: Detail
                  required:
                  - tool
                  - status
                  - filename
                  title: ToolProgressEvent
                  type: object
                tool_connect_prompt:
                  description: 'The model called a connector tool for an app the user hasn''t linked.

                    The UI renders a ''Connect <App>'' button; clicking it opens the OAuth or

                    API-key flow, then the user resends their message.'
                  properties:
                    connector_slug:
                      title: Connector Slug
                      type: string
                    display_name:
                      title: Display Name
                      type: string
                    auth_mode:
                      title: Auth Mode
                      type: string
                    tool_name:
                      title: Tool Name
                      type: string
                    request_id:
                      title: Request Id
                      type: string
                    api_key_fields:
                      default: []
                      items:
